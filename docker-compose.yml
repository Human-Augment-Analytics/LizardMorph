services:
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.13.0
    command: >
      mlflow server
      --backend-store-uri sqlite:///data/mlflow.db
      --default-artifact-root /data/artifacts
      --no-serve-artifacts
      --host 0.0.0.0
      --port 5000
    ports:
      - "5000:5000"
    volumes:
      - ./data:/data

  model-api:
    build: ./model-api
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - mlflow

  flask:
    build: .
    ports:
      - "3000:3000"
    env_file: .env
